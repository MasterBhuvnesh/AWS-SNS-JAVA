version: "3.9"

services:
  otp-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: otp-service:latest
    container_name: otp-service
    ports:
      - "8080:8080"
    env_file:
      - .env          # put your real values here (never commit this)
    environment:
      # These override .env if needed
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/otp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
